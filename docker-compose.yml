# Docker Compose for UX Portfolio Local Development
# Provides complete local development environment

version: '3.8'

services:
  # Main portfolio static server
  portfolio:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.dev
      target: development
    container_name: ux-portfolio-static
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/case-study-generator/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    command: npm run serve:portfolio
    networks:
      - portfolio-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Next.js Case Study Generator
  case-study-generator:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.dev
      target: development
    container_name: ux-portfolio-nextjs
    ports:
      - "3000:3000"
      - "3001:3001"  # Webpack dev server
    volumes:
      - .:/app
      - /app/node_modules
      - /app/case-study-generator/node_modules
      - /app/case-study-generator/.next
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    working_dir: /app/src/tools/case-study-generator
    command: npm run dev
    networks:
      - portfolio-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - portfolio

  # Development tools container
  dev-tools:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.dev
      target: development
    container_name: ux-portfolio-tools
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    networks:
      - portfolio-network
    profiles:
      - tools
    command: tail -f /dev/null  # Keep container running

  # Testing services (run with --profile testing)
  lighthouse:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.dev
      target: development
    container_name: ux-portfolio-lighthouse
    volumes:
      - .:/app
      - ./infrastructure/testing/lighthouse-reports:/app/lighthouse-reports
    environment:
      - NODE_ENV=development
    networks:
      - portfolio-network
    profiles:
      - testing
    depends_on:
      - portfolio
      - case-study-generator
    command: npm run test:lighthouse

  # Accessibility testing
  axe-testing:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.dev
      target: development
    container_name: ux-portfolio-axe
    volumes:
      - .:/app
      - ./infrastructure/testing/accessibility-reports:/app/accessibility-reports
    environment:
      - NODE_ENV=development
    networks:
      - portfolio-network
    profiles:
      - testing
    depends_on:
      - portfolio
      - case-study-generator
    command: npm run test:accessibility

  # Image optimization service
  image-optimizer:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.dev
      target: development
    container_name: ux-portfolio-optimizer
    volumes:
      - .:/app
      - ./images:/app/images
      - ./public/assets:/app/public/assets
    environment:
      - NODE_ENV=development
    networks:
      - portfolio-network
    profiles:
      - tools
    command: npm run optimize:images

networks:
  portfolio-network:
    driver: bridge

volumes:
  node_modules:
  case_study_node_modules:
  nextjs_cache: