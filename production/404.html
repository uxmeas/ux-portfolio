<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — UX Meas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #111111;
      color: #FAFAFA;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
    }
    .container { max-width: 480px; }
    .code {
      font-size: clamp(4rem, 10vw, 6rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #999;
      margin-bottom: 16px;
    }
    h1 { font-size: 24px; font-weight: 500; margin-bottom: 12px; }
    p { font-size: 16px; font-weight: 300; color: #6B6B6B; margin-bottom: 40px; }
    a {
      display: inline-block;
      padding: 14px 36px;
      font-size: 15px;
      font-family: inherit;
      font-weight: 400;
      color: #FAFAFA;
      border: 1px solid rgba(250,250,250,0.2);
      text-decoration: none;
      transition: border-color 0.2s;
    }
    a:hover { border-color: rgba(250,250,250,0.5); }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you are looking for does not exist or has been moved.</p>
    <a href="/">Back to UX Meas</a>
  </div>
</body>
</html>
