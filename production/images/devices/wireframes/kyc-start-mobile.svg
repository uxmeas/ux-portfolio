<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" fill="none">
  <!-- Phone frame -->
  <rect x="1" y="1" width="388" height="842" rx="40" stroke="#2A3545" stroke-width="1.5"/>

  <!-- Status bar -->
  <rect x="30" y="16" width="60" height="4" rx="2" fill="#2A3545" fill-opacity="0.15"/>
  <rect x="300" y="16" width="60" height="4" rx="2" fill="#2A3545" fill-opacity="0.15"/>

  <!-- Nav bar -->
  <rect x="20" y="36" width="350" height="36" rx="4" fill="#2A3545" fill-opacity="0.08"/>
  <rect x="32" y="48" width="16" height="12" rx="2" fill="#2A3545" fill-opacity="0.15"/>
  <rect x="140" y="50" width="110" height="8" rx="3" fill="#2A3545" fill-opacity="0.2"/>
  <circle cx="340" cy="54" r="12" fill="#2A3545" fill-opacity="0.1"/>

  <!-- Shield icon circle -->
  <circle cx="195" cy="120" r="32" stroke="#2A3545" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.4"/>
  <circle cx="195" cy="120" r="14" fill="#2A3545" fill-opacity="0.08"/>

  <!-- Title block -->
  <rect x="80" y="172" width="230" height="14" rx="4" fill="#2A3545" fill-opacity="0.15"/>

  <!-- Description lines -->
  <rect x="55" y="204" width="280" height="6" rx="3" fill="#2A3545" fill-opacity="0.1"/>
  <rect x="75" y="218" width="240" height="6" rx="3" fill="#2A3545" fill-opacity="0.1"/>
  <rect x="95" y="232" width="200" height="6" rx="3" fill="#2A3545" fill-opacity="0.1"/>

  <!-- Feature card 1 -->
  <rect x="28" y="270" width="334" height="72" rx="10" stroke="#2A3545" stroke-width="1" opacity="0.3"/>
  <rect x="48" y="290" width="32" height="32" rx="6" fill="#2A3545" fill-opacity="0.06"/>
  <rect x="96" y="294" width="140" height="8" rx="3" fill="#2A3545" fill-opacity="0.15"/>
  <rect x="96" y="310" width="200" height="6" rx="3" fill="#2A3545" fill-opacity="0.08"/>

  <!-- Feature card 2 -->
  <rect x="28" y="358" width="334" height="72" rx="10" stroke="#2A3545" stroke-width="1" opacity="0.3"/>
  <rect x="48" y="378" width="32" height="32" rx="6" fill="#2A3545" fill-opacity="0.06"/>
  <rect x="96" y="382" width="120" height="8" rx="3" fill="#2A3545" fill-opacity="0.15"/>
  <rect x="96" y="398" width="180" height="6" rx="3" fill="#2A3545" fill-opacity="0.08"/>

  <!-- Feature card 3 -->
  <rect x="28" y="446" width="334" height="72" rx="10" stroke="#2A3545" stroke-width="1" opacity="0.3"/>
  <rect x="48" y="466" width="32" height="32" rx="6" fill="#2A3545" fill-opacity="0.06"/>
  <rect x="96" y="470" width="150" height="8" rx="3" fill="#2A3545" fill-opacity="0.15"/>
  <rect x="96" y="486" width="220" height="6" rx="3" fill="#2A3545" fill-opacity="0.08"/>

  <!-- Time estimate -->
  <circle cx="145" cy="552" r="6" stroke="#2A3545" stroke-width="1" opacity="0.25"/>
  <rect x="160" y="548" width="130" height="6" rx="3" fill="#2A3545" fill-opacity="0.1"/>

  <!-- CTA button -->
  <rect x="80" y="590" width="230" height="48" rx="10" stroke="#2A3545" stroke-width="1.5" opacity="0.35"/>
  <rect x="130" y="608" width="130" height="10" rx="4" fill="#2A3545" fill-opacity="0.12"/>

  <!-- Home indicator -->
  <rect x="145" y="810" width="100" height="4" rx="2" fill="#2A3545" fill-opacity="0.15"/>
</svg>