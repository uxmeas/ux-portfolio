<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" fill="none">
  <!-- Laptop Screen -->
  <rect x="120" y="20" width="960" height="600" rx="12" stroke="#2A3545" stroke-width="2"/>
  <!-- Screen inner bezel -->
  <rect x="132" y="32" width="936" height="576" rx="4" stroke="#2A3545" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>
  <!-- Camera dot -->
  <circle cx="600" cy="14" r="3" stroke="#2A3545" stroke-width="1.5"/>
  <!-- Hinge -->
  <path d="M80 620 L1120 620" stroke="#2A3545" stroke-width="2"/>
  <!-- Base -->
  <path d="M80 620 C80 620 60 622 40 640 L20 660 C10 672 18 690 32 690 L1168 690 C1182 690 1190 672 1180 660 L1160 640 C1140 622 1120 620 1120 620" stroke="#2A3545" stroke-width="2"/>
  <!-- Trackpad outline -->
  <rect x="460" y="700" width="280" height="4" rx="2" stroke="#2A3545" stroke-width="1" opacity="0.3"/>
  <!-- Keyboard area hint -->
  <rect x="180" y="640" width="840" height="30" rx="4" stroke="#2A3545" stroke-width="1" stroke-dasharray="6 4" opacity="0.2"/>
</svg>