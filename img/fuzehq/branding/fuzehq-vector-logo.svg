<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hqGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="55%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#22A7F0"/>
    </linearGradient>
    <linearGradient id="tagGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.35 0 0 0 0 0.22 0 0 0 0 1 0 0 0 .45 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#05070B"/>

  <!-- Editable vector wordmark. Open in Figma/Illustrator and convert text to outlines if needed. -->
  <g transform="translate(164 360)" filter="url(#softGlow)">
    <!-- fuse: tight tracking to create the fused-word feel -->
    <text x="0" y="0"
          font-family="Inter, Avenir Next, Helvetica Neue, Arial, sans-serif"
          font-size="205"
          font-weight="800"
          letter-spacing="-22"
          fill="#F7F8FA">fuze</text>

    <!-- subtle fusion connector between e and h -->
    <rect x="612" y="-102" width="42" height="172" rx="21" fill="#F7F8FA" opacity="0.96"/>

    <!-- hq gradient section -->
    <text x="642" y="0"
          font-family="Inter, Avenir Next, Helvetica Neue, Arial, sans-serif"
          font-size="205"
          font-weight="800"
          letter-spacing="-20"
          fill="url(#hqGradient)">hq</text>
  </g>

  <text x="800" y="525"
        text-anchor="middle"
        font-family="Inter, Avenir Next, Helvetica Neue, Arial, sans-serif"
        font-size="42"
        font-weight="500"
        letter-spacing="18"
        fill="url(#tagGradient)">AI WORK, MADE VISIBLE.</text>
</svg>
